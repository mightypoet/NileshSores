<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nilesh Store | Premium Stationery</title>
    <script>
      // Fix for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This happens when some libraries (like older Supabase or cross-fetch) try to polyfill window.fetch in environments where it is a read-only getter.
      (function() {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: () => originalFetch,
            set: () => { console.warn('Ignored attempt to override window.fetch'); },
            configurable: true
          });
        } catch (e) {
          // If we can't redefine it, we just hope for the best
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
